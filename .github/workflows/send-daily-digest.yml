name: Send Daily Digest

on:
  schedule:
    - cron: "50 0 * * *"
    - cron: "50 1 * * *"
  workflow_dispatch:

jobs:
  send-daily-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Call daily digest endpoint
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            CURRENT_EASTERN_TIME=$(TZ=America/New_York date +%H:%M)

            if [ "$CURRENT_EASTERN_TIME" != "20:50" ]; then
              echo "Skipping because it is $CURRENT_EASTERN_TIME Eastern, not 20:50 Eastern."
              exit 0
            fi
          fi

          curl --fail -X GET "${{ secrets.APP_URL }}/api/jobs/send-daily-digest" \
            -H "Authorization: Bearer ${{ secrets.CHECK_PRICES_SECRET }}"