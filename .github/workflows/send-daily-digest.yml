name: Send Daily Digest

on:
  schedule:
    - cron: "0 20 * * *"
      timezone: "America/New_York"
  workflow_dispatch:

concurrency:
  group: send-daily-digest
  cancel-in-progress: false

jobs:
  send-daily-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Call daily digest endpoint
        run: |
          curl --fail -X GET "${{ secrets.APP_URL }}/api/jobs/send-daily-digest" \
            -H "Authorization: Bearer ${{ secrets.CHECK_PRICES_SECRET }}"